services:
  # ---- Next.js Web Server ----
  web:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    restart: unless-stopped

  # ---- Parse Worker (Claude structured parse) ----
  worker-parse:
    build: .
    command: ["npx", "tsx", "src/workers/parse-worker.ts"]
    env_file: .env
    restart: unless-stopped

  # ---- Generate Worker (image generation) ----
  worker-generate:
    build: .
    command: ["npx", "tsx", "src/workers/generate-worker.ts"]
    env_file: .env
    restart: unless-stopped

  # ---- Export Worker (ZIP export) ----
  worker-export:
    build: .
    command: ["npx", "tsx", "src/workers/export-worker.ts"]
    env_file: .env
    restart: unless-stopped
